{% extends "base.html" %}
{% block title %}Редактировать товар{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
    <a href="/admin/products" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
    <h2 class="fw-bold mb-0">Редактировать товар</h2>
</div>
<div class="card stat-card" style="max-width:600px;">
    <div class="card-body">
        <form method="post" action="/admin/products/{{ product.id }}/edit" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">Название *</label>
                <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Артикул</label>
                <input type="text" name="article" class="form-control" value="{{ product.article or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Описание</label>
                <textarea name="description" class="form-control" rows="3">{{ product.description or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Цена (₽)</label>
                <input type="number" name="price" class="form-control" step="0.01" value="{{ product.price or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Фото</label>
                {% if product.photo_path %}
                <div class="mb-2">
                    <img src="/uploads/{{ product.photo_path }}" height="80" style="border-radius:8px;">
                    <small class="text-muted d-block mt-1">Текущее фото. Загрузите новое, чтобы заменить.</small>
                </div>
                {% endif %}
                <input type="file" name="photo" class="form-control" accept="image/*">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/admin/products" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
