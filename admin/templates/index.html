{% extends "base.html" %}
{% block title %}Дашборд — Catalog Bot{% endblock %}
{% block content %}
<h2 class="mb-4 fw-bold">Дашборд</h2>
<div class="row g-4 mb-5">
    <div class="col-md-4">
        <div class="card stat-card p-4 text-center">
            <div style="font-size:2.5rem; color:#0d6efd;">{{ products_count }}</div>
            <div class="text-muted mt-1"><i class="bi bi-box-seam me-1"></i> Товаров</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card stat-card p-4 text-center">
            <div style="font-size:2.5rem; color:#198754;">{{ users_count }}</div>
            <div class="text-muted mt-1"><i class="bi bi-people me-1"></i> Клиентов</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card stat-card p-4 text-center">
            <div style="font-size:2.5rem; color:#fd7e14;">{{ orders_count }}</div>
            <div class="text-muted mt-1"><i class="bi bi-cart3 me-1"></i> Заявок</div>
        </div>
    </div>
</div>
<div class="row g-4">
    <div class="col-md-6">
        <div class="card stat-card p-4">
            <h5 class="mb-3">Быстрые действия</h5>
            <a href="/admin/products" class="btn btn-primary mb-2 w-100"><i class="bi bi-plus-circle me-2"></i>Добавить товар</a>
            <a href="/admin/excel-template" class="btn btn-outline-success w-100"><i class="bi bi-file-earmark-excel me-2"></i>Скачать шаблон Excel</a>
        </div>
    </div>
</div>
{% endblock %}
