<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админ панель{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #1e2a3b; min-height: 100vh; width: 240px; position: fixed; }
        .sidebar .nav-link { color: #adb5bd; padding: 10px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 6px; }
        .sidebar .brand { color: #fff; font-size: 1.2rem; font-weight: 600; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main-content { margin-left: 240px; padding: 30px; }
        .stat-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .table th { background: #f8f9fa; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>
<div class="sidebar d-flex flex-column">
    <div class="brand">🛍 Catalog Bot</div>
    <nav class="nav flex-column mt-3 px-2">
        <a class="nav-link {% if request.url.path == '/admin' %}active{% endif %}" href="/admin">
            <i class="bi bi-speedometer2 me-2"></i> Дашборд
        </a>
        <a class="nav-link {% if '/products' in request.url.path %}active{% endif %}" href="/admin/products">
            <i class="bi bi-box-seam me-2"></i> Товары
        </a>
        <a class="nav-link {% if '/users' in request.url.path %}active{% endif %}" href="/admin/users">
            <i class="bi bi-people me-2"></i> Клиенты
        </a>
        <a class="nav-link {% if '/orders' in request.url.path %}active{% endif %}" href="/admin/orders">
            <i class="bi bi-cart3 me-2"></i> Заявки
        </a>
    </nav>
</div>
<div class="main-content">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
