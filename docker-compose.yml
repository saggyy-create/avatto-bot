version: '3.8'

services:
  bot:
    build: .
    command: python bot/main.py
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./catalog_bot.db:/app/catalog_bot.db
    restart: unless-stopped

  admin:
    build: .
    command: uvicorn admin.admin_app:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./catalog_bot.db:/app/catalog_bot.db
    restart: unless-stopped
